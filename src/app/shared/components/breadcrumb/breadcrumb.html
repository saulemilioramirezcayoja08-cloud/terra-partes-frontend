<nav class="breadcrumb-component">
  @for (item of items(); track $index) {
    @if ($index > 0) {
      <svg class="separator" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 22L17 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round"></path>
      </svg>
    }
    <span class="item" [class.active]="item.active">{{ item.label }}</span>
  }
</nav>
